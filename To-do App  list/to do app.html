<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>To-Do App</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 min-h-screen flex items-center justify-center p-4 transition duration-300">

  <div class="w-full max-w-md bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-2xl">

    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold text-gray-800 dark:text-white">
        To-Do App
      </h1>

      <button
        id="themeBtn"
        class="bg-gray-200 dark:bg-gray-700 px-4 py-2 rounded-lg text-black dark:text-white"
      >
        🌙
      </button>
    </div>

    <div class="flex gap-2 mb-4">
      <input
        type="text"
        id="taskInput"
        placeholder="Enter task..."
        class="flex-1 p-3 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white outline-none"
      />

      <button
        id="addBtn"
        class="bg-blue-500 hover:bg-blue-600 text-white px-4 rounded-lg"
      >
        Add
      </button>
    </div>

    <ul id="taskList" class="space-y-3"></ul>

  </div>

  <script src="to do app.js"></script>
</body>
</html>
